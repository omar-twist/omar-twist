<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Hafsah's Space</title>
	<style>
		body {
			background:
				repeating-linear-gradient(45deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 48px),
				repeating-linear-gradient(-45deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 48px),
				linear-gradient(135deg, hsl(304, 74%, 88%) 0%, hwb(350 70% 0%) 100%);
			background-attachment: fixed;
			min-height: 100vh;
			margin: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
		}
		main {
			width: 100%;
			max-width: 900px;
			text-align: center;
		}
		h1 {
			color: #fff;
			background: linear-gradient(90deg, #ff6a00, #ee0979);
			padding: 30px 50px;
			border-radius: 20px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.15);
			font-family: 'Segoe UI', Verdana, Geneva, Tahoma, sans-serif;
			font-size: 2.5em;
			letter-spacing: 2px;
			transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
		}
		h1:hover {
			transform: scale(1.07);
			box-shadow: 0 8px 32px rgba(238,9,121,0.25);
			background: linear-gradient(90deg, #ee0979, #ff6a00);
			cursor: pointer;
		}
		#extra-block {
			margin-top: 50px;
		}
		#extra-content {
			margin: 0 auto;
			padding: 40px 30px;
			max-width: 680px;
			border-radius: 22px;
			background: hwb(337 89% 0%);
			border: 1px solid rgba(255, 182, 193, 0.45);
			color: #333;
			box-shadow: 0 12px 35px rgba(0,0,0,0.08);
			text-align: center;
			opacity: 0;
			transform: translateY(30px);
			transition: opacity 0.4s ease, transform 0.4s ease;
			display: none;
		}
		#extra-content.visible {
			display: block;
			opacity: 1;
			transform: translateY(0);
		}
		#extra-content .quote {
			font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
			font-size: 1.05em;
			font-style: italic;
			margin-top: 24px;
			line-height: 1.7;
			background: linear-gradient(135deg, #ff6a00 0%, #ee0979 45%, #8a2be2 100%);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
			text-shadow: 0 1px 2px rgba(0,0,0,0.12);
		}
		#extra-content .name {
			font-size: 1.4em;
			font-weight: 700;
			margin-bottom: 10px;
		}
		#extra-content .role {
			font-size: 1.05em;
			margin: 0;
		}
	</style>
</head>
<body>
	<main>
		<h1 id="hero-title">Welcome to Hafsah's space</h1>
		<div id="extra-block">
			<section id="extra-content" aria-live="polite">
				<p class="name">Hafsah Moulana Hafez</p>
				<p class="role">CS student at Qatar University.</p>
				<p class="quote">“The distance is nothing when one has a motive.”<br>― Jane Austen, <em>Pride and Prejudice</em></p>
			</section>
		</div>
	</main>
	<script>
		const heroTitle = document.getElementById('hero-title');
		const extra = document.getElementById('extra-content');
		function toggleExtra() {
			const isVisible = extra.classList.toggle('visible');
			if (isVisible) {
				extra.scrollIntoView({ behavior: 'smooth', block: 'start' });
			}
		}
		heroTitle.addEventListener('click', toggleExtra);
	</script>
</body>
</html>
